<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCopy - 智能文案生成</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <h1>AutoCopy</h1>
          <p class="subtitle">智能文案生成工具</p>
        </div>
        <button id="openProviderConfig" class="btn-settings" aria-label="模型配置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
      <div class="current-provider" id="currentProviderInfo">
        <span class="current-provider-name">加载中...</span>
      </div>
    </header>

    <main class="main">
      <form id="generateForm" class="form">
        <div class="form-grid">
          <div class="form-group">
            <label for="articleType">文章类型</label>
            <div class="input-with-custom">
              <select id="articleType" name="articleType">
                <option value="推广文案">推广文案</option>
                <option value="产品介绍">产品介绍</option>
                <option value="活动宣传">活动宣传</option>
                <option value="品牌故事">品牌故事</option>
                <option value="知识分享">知识分享</option>
                <option value="情感表达">情感表达</option>
                <option value="新闻资讯">新闻资讯</option>
                <option value="custom">自定义...</option>
              </select>
              <input type="text" id="articleTypeCustom" name="articleTypeCustom" 
                     placeholder="输入自定义类型" style="display: none;" />
            </div>
          </div>

          <div class="form-group">
            <label for="tone">语气风格</label>
            <div class="input-with-custom">
              <select id="tone" name="tone">
                <option value="正式">正式</option>
                <option value="轻松" selected>轻松</option>
                <option value="幽默">幽默</option>
                <option value="专业">专业</option>
                <option value="亲切">亲切</option>
                <option value="激情">激情</option>
                <option value="温暖">温暖</option>
                <option value="客观">客观</option>
              </select>
              <button type="button" id="addCustomToneBtn" class="btn-add-custom" title="添加自定义语气">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="wordCount">字数要求</label>
            <input type="number" id="wordCount" name="wordCount" 
                   min="10" max="2000" value="200" />
          </div>

          <div class="form-group">
            <label for="provider">使用模型</label>
            <select id="provider" name="provider">
              <option value="">请先选择模型</option>
            </select>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="content">内容描述</label>
          <textarea id="content" name="content" rows="3" 
                    placeholder="描述您想要生成的文案内容..." required></textarea>
        </div>

        <div class="form-group full-width">
          <label for="keywords">关键词</label>
          <input type="text" id="keywords" name="keywords" 
                 placeholder="输入关键词，自动识别（支持中英文、逗号或空格分隔）" />
          <div id="keywordsTags" class="keywords-tags"></div>
          <small class="hint" id="keywordsHint"></small>
        </div>

        <div class="form-group full-width">
          <label for="additionalRequirements">其他要求</label>
          <textarea id="additionalRequirements" name="additionalRequirements" 
                    rows="2" placeholder="如有特殊要求请在此说明..."></textarea>
        </div>

        <div class="form-row-inline">
          <div class="form-group">
            <label>格式选项</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="useParagraphs" name="useParagraphs" checked>
                <span class="checkbox-custom"></span>
                自动分段
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="useEmoji" name="useEmoji">
                <span class="checkbox-custom"></span>
                添加表情
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="useHashtag" name="useHashtag">
                <span class="checkbox-custom"></span>
                添加标签
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="previewPrompt" name="previewPrompt">
                <span class="checkbox-custom"></span>
                预览提示词
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="enableScoring" name="enableScoring">
                <span class="checkbox-custom"></span>
                启用评分
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>生成版本</label>
            <div class="radio-group" id="countRadioGroup">
              <label class="radio-label">
                <input type="radio" name="count" value="1" checked>
                <span class="radio-custom"></span>
                1
              </label>
              <label class="radio-label">
                <input type="radio" name="count" value="2">
                <span class="radio-custom"></span>
                2
              </label>
              <label class="radio-label">
                <input type="radio" name="count" value="3">
                <span class="radio-custom"></span>
                3
              </label>
              <label class="radio-label">
                <input type="radio" name="count" value="4">
                <span class="radio-custom"></span>
                4
              </label>
              <label class="radio-label">
                <input type="radio" name="count" value="5">
                <span class="radio-custom"></span>
                5
              </label>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submitBtn" class="btn btn-primary">
            <span class="btn-text">生成文案</span>
            <span class="btn-loading">
              <span class="spinner"></span>
              生成中
            </span>
          </button>
        </div>
      </form>

      <section id="results" class="results" style="display: none;">
        <h2>生成结果</h2>
        <div id="resultsContainer" class="results-container"></div>
      </section>
    </main>
  </div>

  <button id="backToTop" class="back-to-top" aria-label="回到顶部" title="回到顶部">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
